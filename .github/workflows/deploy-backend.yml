name: Deploy Backend
on:
  push:
    branches: [master]
    paths: ['backend/**', '.github/workflows/deploy-backend.yml']
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/bare-basics-backend:latest ./backend
          docker push $REGISTRY/bare-basics-backend:latest
      - name: Roll out to ECS
        run: |
          aws ecs update-service \
            --cluster default \
            --service bare-basics-backend-be53 \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
