services:
  - type: web
    name: emotion-detector-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://emotion-detector-backend.onrender.com
      - key: NODE_VERSION
        value: 18.18.0
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=3600"
    buildFilter:
      paths:
        - src/**
        - public/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - node_modules/**
        - .git/** 