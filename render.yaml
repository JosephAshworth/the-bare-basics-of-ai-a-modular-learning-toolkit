services:
  - type: web
    name: emotion-detector-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://emotion-detector-backend.onrender.com
      - key: NODE_VERSION
        value: 18.18.0
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=3600"
    buildFilter:
      paths:
        - frontend/src/**
        - frontend/public/**
        - frontend/package.json
        - frontend/package-lock.json
      ignoredPaths:
        - frontend/node_modules/**
        - frontend/.git/**
  
  - type: web
    name: emotion-detector-backend
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && python render_setup.py
    startCommand: cd backend && gunicorn run:app -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: models-data
      mountPath: /opt/render/project/src/backend/saved_models
      sizeGB: 1
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - backend/debug/**
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*" 