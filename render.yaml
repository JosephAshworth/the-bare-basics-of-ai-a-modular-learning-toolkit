services:
  - type: web
    name: emotion-detector-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://emotion-detector-backend-test.onrender.com
      - key: NODE_VERSION
        value: 18.18.0 